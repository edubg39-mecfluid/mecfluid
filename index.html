<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Control de Presión</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'VT323', monospace; background-color: #050505; }
        .pantalla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pantalla.activa { display: flex; }

        /* --- INICIO --- */
        #pantalla-inicio { background: url('fondo (2).png') center/cover; }
        .boton-invisible { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 80px; cursor: pointer; background: transparent; z-index: 999; }
        .boton-invisible:hover { background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 30px #00ffff; }

        /* --- MAPAS --- */
        #pantalla-mapa, #pantalla-habitacion { background: #010101; }
        .titulo-mapa { color: #00ffff; font-size: 38px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 10px #00ffff; }
        .contenedor-mapa { position: relative; width: 850px; height: 500px; border: 1px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        
        .nodo { position: absolute; width: 45px; height: 45px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 2px solid white; z-index: 10; transition: 0.3s; }
        .nodo-rojo { background: rgba(255, 7, 58, 0.5); border-color: #ff073a; box-shadow: 0 0 15px #ff073a; animation: pulso 1s infinite; }
        .nodo-verde { background: rgba(57, 255, 20, 0.6); border-color: #39ff14; box-shadow: 0 0 15px #39ff14; }
        .nodo-bloqueado { background: #222; border-color: #444; color: #555; cursor: not-allowed; }

        @keyframes pulso { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        /* --- PANEL DE PROBLEMA --- */
        #pantalla-valvula { background: linear-gradient(rgba(0,10,20,0.9), rgba(0,0,0,0.9)), url('techlab.jpg') center/cover; }
        .panel-azul { background: rgba(0, 51, 102, 0.8); padding: 35px; border-radius: 15px; border: 2px solid #00ffff; width: 550px; text-align: center; backdrop-filter: blur(10px); }
        .sub-titulo { color: #00ffff; font-size: 20px; letter-spacing: 2px; }
        input { font-family: 'VT323'; font-size: 35px; width: 200px; background: #000; color: #00ffff; border: 2px solid #00ffff; text-align: center; margin: 15px 0; outline: none; }
        .btn-verificar { font-family: 'VT323'; font-size: 26px; background: #00ffff; color: #000; border: none; padding: 10px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* --- NARRADOR --- */
        #pantalla-narrador { background: url('techlab.jpg') center/cover; }
        #caja-narrador { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0, 15, 30, 0.6); border: 2px solid #00ffff; padding: 20px; display: flex; align-items: center; gap: 20px; border-radius: 15px; }
        #foto-narrador { width: 220px; filter: drop-shadow(0 0 10px #00ffff); }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div class="boton-invisible" onclick="irANarrador()"></div>
    </div>

    <div id="pantalla-narrador" class="pantalla">
        <div id="caja-narrador">
            <img id="foto-narrador" src="chico111.png">
            <div id="texto-narrador" style="font-size: 30px; color: #00ffff;"></div>
        </div>
        <button id="btn-next" class="btn-verificar" style="display:none; position:absolute; top:40%;" onclick="irAMapa()">[ INICIAR SECTOR 11 ]</button>
    </div>

    <div id="pantalla-mapa" class="pantalla">
        <h1 class="titulo-mapa">MAPA GLOBAL: SECTOR 11</h1>
        <div class="contenedor-mapa" style="background: url('mapa_neon.png') center/contain no-repeat;">
            <div class="nodo nodo-rojo" id="main-1" onclick="abrirHabitacion(1)" style="top: 25%; left: 25%;">1</div>
            <div class="nodo nodo-bloqueado" id="main-2" style="top: 25%; left: 75%;">2</div>
            <div class="nodo nodo-bloqueado" id="main-3" style="top: 75%; left: 25%;">3</div>
            <div class="nodo nodo-bloqueado" id="main-4" style="top: 75%; left: 75%;">4</div>
        </div>
    </div>

    <div id="pantalla-habitacion" class="pantalla">
        <h1 class="titulo-mapa" id="titulo-hab">HABITACIÓN 1</h1>
        <div class="contenedor-mapa" style="background: rgba(0, 255, 255, 0.05); border-style: dashed;">
            <div class="nodo nodo-rojo" id="sub-1" onclick="irAProblema(1)" style="top: 30%; left: 30%;">A</div>
            <div class="nodo nodo-bloqueado" id="sub-2" style="top: 30%; left: 70%;">B</div>
            <div class="nodo nodo-bloqueado" id="sub-3" style="top: 70%; left: 30%;">C</div>
            <div class="nodo nodo-bloqueado" id="sub-4" style="top: 70%; left: 70%;">D</div>
        </div>
        <button class="btn-verificar" style="margin-top:15px;" onclick="irAMapa()">[ VOLVER ]</button>
    </div>

    <div id="pantalla-valvula" class="pantalla">
        <div class="panel-azul">
            <div class="sub-titulo" id="paso-info">PUNTO A: PASO 1/3</div>
            <h2 id="titulo-punto" style="color:#00ffff; margin:10px 0;">CONVERSIÓN DE UNIDADES</h2>
            <div id="enunciado" style="font-size: 26px; margin-bottom: 15px;"></div>
            <input type="number" id="inputRes" step="any" placeholder="0.00">
            <br>
            <button class="btn-verificar" onclick="verificarRes()">[ VERIFICAR ]</button>
            <div id="feed" style="margin-top:20px; font-size:24px;"></div>
        </div>
    </div>

    <script>
        let vAct = 1; 
        let tAct = 0; 
        let subFase = 1; // 1: bar, 2: mbar, 3: N/mm2
        let valorBasePa = 0;
        let sol = 0;
        let progreso = { 1: [false, false, false, false], 2: [false, false, false, false], 3: [false, false, false, false], 4: [false, false, false, false] };

        function mostrar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        function irANarrador() {
            mostrar('pantalla-narrador');
            const txt = "¡Atención! Presión crítica en el Sector 11. Complete la cadena de conversiones en el Punto A para estabilizar el primer nivel.";
            let i = 0; const caja = document.getElementById("texto-narrador"); caja.innerText = "";
            let intv = setInterval(() => {
                caja.innerText += txt.charAt(i); i++;
                if(i >= txt.length){ clearInterval(intv); document.getElementById('btn-next').style.display="block"; }
            }, 30);
        }

        function irAMapa() { mostrar('pantalla-mapa'); actualizarMapas(); }

        function abrirHabitacion(n) {
            if(n > 1 && !progreso[n-1].every(x => x === true)) return;
            vAct = n; mostrar('pantalla-habitacion');
            document.getElementById('titulo-hab').innerText = `HABITACIÓN ${n}`;
            actualizarMapas();
        }

        function irAProblema(t) {
            tAct = t;
            if (t === 1 && vAct === 1) { // Punto A de Válvula 1
                if(subFase === 1) valorBasePa = (Math.floor(Math.random() * 9) + 1) * 100000;
            }
            mostrar('pantalla-valvula');
            generarReto();
        }

        function generarReto() {
            const env = document.getElementById("enunciado");
            const paso = document.getElementById("paso-info");
            document.getElementById("inputRes").value = "";
            document.getElementById("feed").innerText = "";

            if (tAct === 1 && vAct === 1) { // Lógica encadenada del Punto A
                paso.innerText = `PUNTO A: PASO ${subFase}/3`;
                if (subFase === 1) {
                    sol = valorBasePa / 100000;
                    env.innerHTML = `Valor base: <b>${valorBasePa.toLocaleString()} $Pa$</b> <br> Conviértelo a <b>$bar$</b>`;
                } else if (subFase === 2) {
                    sol = valorBasePa / 100;
                    env.innerHTML = `Mismo valor: <b>${valorBasePa.toLocaleString()} $Pa$</b> <br> Conviértelo a <b>$mbar$</b>`;
                } else {
                    sol = valorBasePa / 1000000;
                    env.innerHTML = `Mismo valor: <b>${valorBasePa.toLocaleString()} $Pa$</b> <br> Conviértelo a <b>$N/mm^2$</b>`;
                }
            } else {
                // Otros puntos (B, C, D) pueden tener sus retos aquí
                paso.innerText = `PUNTO ${String.fromCharCode(64+tAct)}`;
                env.innerHTML = "Reto en construcción...";
                sol = 999; 
            }
        }

        function verificarRes() {
            const res = parseFloat(document.getElementById("inputRes").value);
            const feed = document.getElementById("feed");

            if (Math.abs(res - sol) < 0.001) {
                feed.style.color = "#39ff14"; feed.innerText = "✓ CORRECTO";
                
                setTimeout(() => {
                    if (tAct === 1 && vAct === 1 && subFase < 3) {
                        subFase++;
                        generarReto();
                    } else {
                        progreso[vAct][tAct-1] = true;
                        subFase = 1; // Reset para la próxima vez o siguiente válvula
                        if (progreso[vAct].every(x => x === true)) alert("VÁLVULA COMPLETADA");
                        abrirHabitacion(vAct);
                    }
                }, 1000);
            } else {
                feed.style.color = "#ff073a"; feed.innerText = "✗ FALLO: REINICIANDO CADENA...";
                setTimeout(() => {
                    subFase = 1; // Si falla, vuelve al paso 1
                    valorBasePa = (Math.floor(Math.random() * 9) + 1) * 100000; // Nuevo valor
                    generarReto();
                }, 1500);
            }
        }

        function actualizarMapas() {
            // Mapa Global
            for(let i=1; i<=4; i++){
                let n = document.getElementById(`main-${i}`);
                if(progreso[i].every(x => x === true)) n.className = "nodo nodo-verde";
                else if(i === 1 || progreso[i-1].every(x => x === true)) {
                    n.className = "nodo nodo-rojo";
                    n.onclick = () => abrirHabitacion(i);
                }
            }
            // Sub-Mapa
            for(let i=1; i<=4; i++){
                let n = document.getElementById(`sub-${i}`);
                if(progreso[vAct][i-1]) {
                    n.className = "nodo nodo-verde";
                    n.onclick = null;
                } else if(i === 1 || progreso[vAct][i-2]) {
                    n.className = "nodo nodo-rojo";
                    n.onclick = () => irAProblema(i);
                } else {
                    n.className = "nodo nodo-bloqueado";
                    n.onclick = null;
                }
            }
        }
    </script>
</body>
</html>
