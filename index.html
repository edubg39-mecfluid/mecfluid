<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUAFLUID - Laboratorio Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'VT323', monospace;
            /* IMAGEN DE FONDO DEL LABORATORIO */
            background-image: url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        #capa-alarma {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: transparent; z-index: 2; pointer-events: none;
        }

        /* Animación del parpadeo rojo */
        .alarma-activada {
            animation: parpadeo-rojo 1s infinite !important;
        }
        @keyframes parpadeo-rojo { 
            0% { background-color: rgba(255, 0, 0, 0.2); } 
            50% { background-color: rgba(255, 0, 0, 0.7); } 
            100% { background-color: rgba(255, 0, 0, 0.2); } 
        }

        /* Contenedor del Narrador (Videollamada) */
        #caja-narrador {
            position: absolute; bottom: 50px; left: 50px; width: 300px; background-color: rgba(0, 0, 0, 0.8); border: 2px solid #00ffff; border-radius: 10px;
            padding: 15px; text-align: center; z-index: 3; box-shadow: 0 0 20px #00ffff; color: #00ffff;
        }

        /* IMAGEN DEL NARRADOR */
        #foto-narrador {
            width: 100%; height: 200px; object-fit: cover; border-radius: 5px; border: 1px solid #00ffff;
        }

        #nombre-narrador {
            margin-top: 10px; font-size: 24px; letter-spacing: 2px;
        }

        /* Notificación de Emergencia (Oculta al principio) */
        #notificacion-emergencia {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #111; border: 4px solid #ff073a; padding: 40px;
            text-align: center; z-index: 10; border-radius: 15px; box-shadow: 0 0 50px #ff073a; color: #fff; min-width: 400px;
        }

        #notificacion-emergencia h1 {
            color: #ff073a; margin-top: 0; font-size: 40px; animation: texto-parpadea 0.5s infinite;
        }

        @keyframes texto-parpadea { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        #notificacion-emergencia p {
            font-size: 24px;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* Botón ABRIR */
        .btn-abrir {
            background-color: #ff073a; color: white; font-family: 'VT323', monospace; font-size: 32px; padding: 15px 50px; border: none;
            border-radius: 5px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        .btn-abrir:hover {
            background-color: white; color: #ff073a; box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>

    <div id="capa-alarma"></div>

    <div id="caja-narrador">
        <img id="foto-narrador" src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=500&auto=format&fit=crop" alt="Dr. AQUAFLUID">
        <div id="nombre-narrador">TRANSMISIÓN ENTRANTE...</div>
    </div>

    <div id="notificacion-emergencia">
        <h1>¡FALLO CRÍTICO DEL SISTEMA!</h1>
        <p>Se requiere intervención manual inmediata.</p>
        <button class="btn-abrir" onclick="window.location.href='alerta.html'">[ ABRIR ]</button>
    </div>

    <script>
        // Esta función se ejecuta sola cuando carga la página
        window.onload = function() {
            // Esperamos 4 segundos (4000 milisegundos)
            setTimeout(function() {
                
                // 1. Cambiamos el texto del narrador
                document.getElementById('nombre-narrador').innerText = "¡SISTEMA CAÍDO!";
                document.getElementById('caja-narrador').style.borderColor = "#ff073a";
                document.getElementById('caja-narrador').style.color = "#ff073a";
                
                // 2. Activamos la luz roja parpadeante de fondo
                document.getElementById('capa-alarma').classList.add('alarma-activada');
                
                // 3. Mostramos la notificación gigante en el centro
                document.getElementById('notificacion-emergencia').style.display = 'block';

            }, 4000); // <-- Puedes cambiar este 4000 para que tarde más o menos
        };
    </script>

</body>
</html>
