<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Sector 11 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'VT323', monospace; background-color: #050505; color: white; }
        .pantalla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pantalla.activa { display: block; }
        .flex-centrado { display: flex !important; }

        /* ================= ESTILOS DE MAPAS ================= */
        .contenedor-mapa { position: relative; width: 900px; height: 900px; border: 1px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        .nodo { position: absolute; width: 45px; height: 45px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; border: 2px solid white; transition: 0.3s; z-index: 10;}
        
        .nodo-rojo { background: rgba(255, 7, 58, 0.3); border-color: #ff073a; box-shadow: 0 0 20px #ff073a; animation: pulso-rojo 1s infinite; }
        .nodo-verde { background: rgba(57, 255, 20, 0.5); border-color: #39ff14; box-shadow: 0 0 20px #39ff14; cursor: default; }
        .nodo-bloqueado { background: rgba(50, 50, 50, 0.8); border-color: #555; color: #888; cursor: not-allowed; }

        @keyframes pulso-rojo { 0% { box-shadow: 0 0 10px #ff073a; } 50% { box-shadow: 0 0 30px #ff073a; } 100% { box-shadow: 0 0 10px #ff073a; } }

        /* ================= PANTALLAS ESPECÍFICAS ================= */
        #pantalla-inicio { background: url('fondo (2).png') center/cover; }
        #pantalla-narrador { background: url('techlab.jpg') center/cover; }
        #pantalla-mapa { background: #010101; }
        #pantalla-habitacion { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('techlab.jpg') center/cover; }

        /* Filtros y Cajas */
        #filtro-oscuro { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 1; }
        #caja-narrador { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 1100px; max-width: 95%; background: rgba(0, 15, 30, 0.4); backdrop-filter: blur(5px); border: 2px solid #00ffff; border-radius: 15px; padding: 30px; z-index: 3; display: flex; gap: 40px; align-items: center; }
        #foto-narrador { width: 300px; height: auto; filter: drop-shadow(0 0 15px #00ffff); }

        .panel-azul { background: rgba(0, 51, 102, 0.9); padding: 40px; border-radius: 15px; box-shadow: 0 0 40px rgba(0, 255, 255, 0.3); width: 500px; text-align: center; border: 3px solid #00ffff; backdrop-filter: blur(5px); }
        .btn-accion { font-family: 'VT323'; font-size: 26px; background: #00ffff; color: #001f3f; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 10px; }
        .btn-accion:hover { background: #ffffff; box-shadow: 0 0 20px #ffffff; }

        .alarma-activada { animation: parpadeo-rojo 1s infinite !important; }
        @keyframes parpadeo-rojo { 0% { background: rgba(255, 0, 0, 0.1); } 50% { background: rgba(255, 0, 0, 0.85); } 100% { background: rgba(255, 0, 0, 0.1); } }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div style="position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 80px; cursor: pointer;" onclick="irANarrador()"></div>
    </div>

    <div id="pantalla-narrador" class="pantalla">
        <div id="filtro-oscuro"></div>
        <div id="capa-alarma" style="position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></div>
        <div id="caja-narrador">
            <img id="foto-narrador" src="chico111.png" alt="Director">
            <div id="texto-narrador" style="font-size: 32px; color: #00ffff;"></div>
        </div>
        <div id="notificacion-emergencia" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 0, 0, 0.95); border: 5px solid #ff073a; padding: 50px; text-align: center; z-index: 10; border-radius: 10px;">
            <h1 style="color: #ff073a; font-size: 60px;">¡FALLO CRÍTICO!</h1>
            <p style="font-size: 30px;">Sector 11 comprometido. Los depósitos colapsarán.</p>
            <button class="btn-accion" style="background:#ff073a; color:white;" onclick="irAAlerta()">[ ABRIR PROTOCOLO ]</button>
        </div>
    </div>

    <div id="pantalla-alerta" class="pantalla flex-centrado">
        <h1 style="color: #ff073a; font-size: 50px;">ALERTA DE SISTEMA</h1>
        <div id="texto-historia" style="font-size: 26px; max-width: 800px; text-align: left; margin: 20px;"></div>
        <button id="btn-start-hacker" class="btn-accion" style="display:none;" onclick="irAMapa()">[ ACCEDER AL SECTOR 11 ]</button>
    </div>

    <div id="pantalla-mapa" class="pantalla flex-centrado">
        <h1 style="color:#00ffff; margin-bottom: 20px;">SECTOR 11: MAPA TÁCTICO</h1>
        <div class="contenedor-mapa" style="background: url('mapa_neon.png') center/contain no-repeat;">
            <div class="nodo nodo-rojo" id="main-1" onclick="abrirHabitacion(1)" style="top: 22%; left: 32%;">1</div>
            <div class="nodo nodo-bloqueado" id="main-2" onclick="alert('Sistema Bloqueado: Completa V1')" style="top: 18%; left: 71%;">2</div>
            <div class="nodo nodo-bloqueado" id="main-3" onclick="alert('Sistema Bloqueado: Completa V2')" style="top: 55%; left: 30%;">3</div>
        </div>
    </div>

    <div id="pantalla-habitacion" class="pantalla flex-centrado">
        <h1 id="titulo-habitacion" style="color:#00ffff;">HABITACIÓN 1: PUNTOS DE CONTROL</h1>
        <div class="contenedor-mapa" style="background: rgba(0, 255, 255, 0.05); border-style: dashed;">
            <div class="nodo nodo-rojo" id="sub-1" onclick="irAProblema(1)" style="top: 30%; left: 30%;">A</div>
            <div class="nodo nodo-rojo" id="sub-2" onclick="irAProblema(2)" style="top: 30%; left: 70%;">B</div>
            <div class="nodo nodo-rojo" id="sub-3" onclick="irAProblema(3)" style="top: 70%; left: 30%;">C</div>
            <div class="nodo nodo-rojo" id="sub-4" onclick="irAProblema(4)" style="top: 70%; left: 70%;">D</div>
        </div>
        <button class="btn-accion" onclick="irAMapa()">[ VOLVER AL MAPA GLOBAL ]</button>
    </div>

    <div id="pantalla-valvula" class="pantalla flex-centrado">
        <div class="panel-azul">
            <h2 id="titulo-problema">Punto de Control A</h2>
            <div id="enunciado-fase" style="font-size: 24px; margin-bottom: 15px;"></div>
            <input type="number" id="respuestaAlumno" placeholder="???" autocomplete="off">
            <button class="btn-accion" onclick="comprobarRespuesta()">[ VERIFICAR ]</button>
            <div id="mensaje-valvula"></div>
        </div>
    </div>

    <script>
        /* --- ESTADO DEL JUEGO --- */
        let valvulaActual = 1;
        let subTareaActual = 0;
        let progreso = {
            1: [false, false, false, false], // Válvula 1: Subtareas A, B, C, D
            2: [false, false, false, false]
        };
        let soluciones = [0, 1000, 50, 200, 15]; // Respuestas ejemplo para A, B, C, D

        /* --- NAVEGACIÓN --- */
        function ocultarTodo() {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa', 'flex-centrado'));
        }

        function irANarrador() {
            ocultarTodo();
            document.getElementById('pantalla-narrador').classList.add('activa', 'flex-centrado');
            escribirDialogo();
        }

        function irAAlerta() {
            ocultarTodo();
            document.getElementById('pantalla-alerta').classList.add('activa', 'flex-centrado');
            escribirHistoriaHacker();
        }

        function irAMapa() {
            ocultarTodo();
            document.getElementById('pantalla-mapa').classList.add('activa', 'flex-centrado');
            actualizarMapaPrincipal();
        }

        /* --- LÓGICA DE HABITACIONES --- */
        function abrirHabitacion(num) {
            valvulaActual = num;
            ocultarTodo();
            document.getElementById('pantalla-habitacion').classList.add('activa', 'flex-centrado');
            document.getElementById('titulo-habitacion').innerText = `HABITACIÓN ${num}: PUNTOS DE CONTROL`;
            actualizarSubNodos();
        }

        function irAProblema(subId) {
            subTareaActual = subId;
            ocultarTodo();
            document.getElementById('pantalla-valvula').classList.add('activa', 'flex-centrado');
            
            // Generar problemas diferentes para cada punto
            const enunciados = [
                "", 
                "Calcula la presión hidrostática si h=10m. (P = rho*g*h | rho=100, g=1)",
                "Calcula el Caudal si v=5 m/s y A=10 m². (Q = v*A)",
                "Calcula la Fuerza si P=100 Pa y A=2 m². (F = P*A)",
                "Torricelli: v de salida si h=11.25m y g=10. (v=sqrt(2gh))"
            ];
            soluciones = [0, 1000, 50, 200, 15]; // Respuestas para esos enunciados
            
            document.getElementById('titulo-problema').innerText = `Punto de Control ${String.fromCharCode(64 + subId)}`;
            document.getElementById('enunciado-fase').innerText = enunciados[subId];
            document.getElementById('respuestaAlumno').value = "";
            document.getElementById('mensaje-valvula').innerText = "";
        }

        function comprobarRespuesta() {
            const input = document.getElementById('respuestaAlumno').value;
            const msg = document.getElementById('mensaje-valvula');

            if (parseInt(input) === soluciones[subTareaActual]) {
                msg.style.color = "#39ff14";
                msg.innerText = "¡CORRECTO! SISTEMA ESTABILIZADO.";
                progreso[valvulaActual][subTareaActual - 1] = true;
                
                setTimeout(() => {
                    // Si todas las sub-tareas están listas
                    if (progreso[valvulaActual].every(item => item === true)) {
                        alert("¡HABITACIÓN COMPLETADA! Enviando señal MQTT...");
                        enviarMQTT();
                        irAMapa();
                    } else {
                        abrirHabitacion(valvulaActual);
                    }
                }, 1500);
            } else {
                msg.style.color = "#ff073a";
                msg.innerText = "ERROR DE CÁLCULO.";
            }
        }

        /* --- ACTUALIZACIÓN DE UI --- */
        function actualizarMapaPrincipal() {
            const v1Completa = progreso[1].every(i => i === true);
            const n1 = document.getElementById('main-1');
            const n2 = document.getElementById('main-2');

            if (v1Completa) {
                n1.className = "nodo nodo-verde";
                n2.className = "nodo nodo-rojo";
            }
        }

        function actualizarSubNodos() {
            for (let i = 1; i <= 4; i++) {
                const nodo = document.getElementById(`sub-${i}`);
                if (progreso[valvulaActual][i-1]) {
                    nodo.className = "nodo nodo-verde";
                } else {
                    nodo.className = "nodo nodo-rojo";
                }
            }
        }

        /* --- NARRADOR Y HACKER (Simplificado de tu código) --- */
        const dialogo = "... (Texto del narrador) ..."; // Usa el tuyo original
        let i_dialogo = 0;
        function escribirDialogo() {
            if (i_dialogo < dialogo.length) {
                document.getElementById("texto-narrador").innerHTML += dialogo.charAt(i_dialogo);
                i_dialogo++; setTimeout(escribirDialogo, 40);
            } else { setTimeout(activarSusto, 1000); }
        }
        function activarSusto() {
            document.getElementById('capa-alarma').classList.add('alarma-activada');
            document.getElementById('notificacion-emergencia').style.display = 'block';
        }
        function escribirHistoriaHacker() {
            const msg = "SISTEMA COMPROMETIDO...\nEstabiliza los puntos A, B, C y D de cada válvula.";
            document.getElementById("texto-historia").innerText = msg;
            document.getElementById("btn-start-hacker").style.display = "block";
        }

        /* --- MQTT --- */
        let client;
        function conectarMQTT() { client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "cl_" + Math.random()); client.connect({onSuccess: () => console.log("MQTT OK")}); }
        function enviarMQTT() { if(client) { let m = new Paho.MQTT.Message("CERRAR_V"+valvulaActual); m.destinationName = "mecfluid/escuela/valvulas"; client.send(m); } }
        
        window.onload = conectarMQTT;
    </script>
</body>
</html>
