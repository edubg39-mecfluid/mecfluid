<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Escape Room</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'VT323', monospace; background-color: #050505; }
        
        .pantalla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .pantalla.activa { display: block; }

        /* ================= PANTALLA 1: INICIO ================= */
        #pantalla-inicio { background: url('fondo (2).png') center/cover; }
        .boton-invisible { 
            position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); 
            width: 350px; height: 80px; cursor: pointer; background-color: transparent; border-radius: 10px; 
        }
        .boton-invisible:hover { background-color: rgba(0, 255, 255, 0.3); box-shadow: 0 0 30px #00ffff; }

        /* ================= PANTALLA 2: NARRADOR ================= */
        #pantalla-narrador { background: url('techlab.jpg') center/cover; }
        #filtro-oscuro { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 1; }
        
        #capa-alarma { position: absolute; width: 100%; height: 100%; background: transparent; z-index: 2; pointer-events: none; }
        .alarma-activada { animation: parpadeo-rojo 1s infinite !important; }
        @keyframes parpadeo-rojo { 0% { background: rgba(255, 0, 0, 0.1); } 50% { background: rgba(255, 0, 0, 0.85); } 100% { background: rgba(255, 0, 0, 0.1); } }
        
        /* CIENTÍFICO FUERA DEL CUADRO */
        #foto-narrador { 
            position: absolute; bottom: 0; left: 5%; width: 450px; height: auto; 
            z-index: 4; object-fit: contain; filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)); 
        }

        /* CUADRO DE TEXTO HOLOGRAMA */
        #caja-narrador { 
            position: absolute; bottom: 15%; left: 40%; width: 700px; 
            background: rgba(0, 15, 30, 0.3); backdrop-filter: blur(8px); 
            border: 2px solid #00ffff; border-radius: 15px; padding: 40px; 
            z-index: 5; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); 
        }
        #texto-narrador { color: #00ffff; font-size: 32px; line-height: 1.3; text-shadow: 0 0 10px #00ffff; }

        #notificacion-emergencia { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(10, 0, 0, 0.95); border: 5px solid #ff073a; padding: 50px; text-align: center; 
            z-index: 10; border-radius: 10px; box-shadow: 0 0 100px #ff073a; min-width: 600px; 
        }
        #notificacion-emergencia h1 { color: #ff073a; font-size: 60px; margin-top:0; text-shadow: 0 0 20px #ff073a; animation: texto-parpadea 0.5s infinite; }
        @keyframes texto-parpadea { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        #notificacion-emergencia p { font-size: 30px; color: #e6f2ff; margin-bottom: 40px; }
        .btn-rojo { background: #ff073a; color: white; font-family: 'VT323'; font-size: 38px; padding: 15px 60px; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; box-shadow: 0 0 20px #ff073a;}
        .btn-rojo:hover { background: white; color: #ff073a; box-shadow: 0 0 50px white; }

        /* ================= PANTALLA 3: TERMINAL HACKER ================= */
        #pantalla-alerta { background: #050505; color: #39ff14; text-align: center; padding-top: 50px; }
        .scanlines { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 6px 100%; pointer-events: none; }
        .titulo-hacker { color: #ff073a; font-size: 50px; text-shadow: 0 0 10px #ff073a; text-transform: uppercase; }
        #texto-historia { font-size: 26px; max-width: 800px; margin: 10px auto; text-align: left; line-height: 1.15; min-height: 150px; }
        #btn-start-hacker { display: none; background: transparent; color: #00ffff; border: 2px solid #00ffff; padding: 15px 40px; font-size: 30px; font-family: 'VT323'; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); animation: parpadeo-lento 1.5s infinite; position: relative; z-index: 10;}
        #btn-start-hacker:hover { background: #00ffff; color: #000; }

        /* ================= PANTALLA 4: MAPA TÁCTICO ================= */
        #pantalla-mapa { background: #050505; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #pantalla-mapa.activa { display: flex; }
        .titulo-mapa { color: #00ffff; font-size: 45px; margin-bottom: 20px; text-shadow: 0 0 15px #00ffff; text-transform: uppercase; }
        .contenedor-mapa { position: relative; width: 900px; height: 550px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=2070&auto=format&fit=crop') center/cover; border: 2px solid #00ffff; }
        .nodo { position: absolute; width: 45px; height: 45px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; color: white; border: 2px solid white; transition: 0.3s; z-index: 10;}
        .nodo-rojo { background: #ff073a; box-shadow: 0 0 20px #ff073a; animation: pulso-rojo 1s infinite; }
        .nodo-verde { background: #39ff14; box-shadow: 0 0 20px #39ff14; pointer-events: none; color: black; }
        @keyframes pulso-rojo { 0% { box-shadow: 0 0 10px #ff073a; } 50% { box-shadow: 0 0 30px #ff073a; } 100% { box-shadow: 0 0 10px #ff073a; } }

        /* ================= PANTALLA 5: VÁLVULA 1 ================= */
        #pantalla-valvula { background: linear-gradient(rgba(0, 31, 63, 0.85), rgba(0, 31, 63, 0.9)), url('fondo.jpg') center/cover; display: none; align-items: center; justify-content: center; }
        #pantalla-valvula.activa { display: flex; }
        .panel-azul { background: rgba(0, 51, 102, 0.9); padding: 30px; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); width: 400px; text-align: center; border: 3px solid #00ffff; backdrop-filter: blur(5px); color: #e6f2ff; }
        .panel-azul input { font-family: 'VT323'; font-size: 35px; padding: 10px; width: 80%; margin: 15px 0; background: #001f3f; color: #00ffff; border: 2px solid #00ffff; text-align: center; }
        .btn-accion { font-family: 'VT323'; font-size: 26px; background: #00ffff; color: #001f3f; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 85%; font-weight: bold; transition: 0.3s; }
        .btn-volver-mapa { display: none; background: #39ff14; color: #000; margin-top: 15px; }
        #mensaje-valvula { margin-top: 15px; font-size: 28px; height: 60px; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div class="boton-invisible" onclick="irANarrador()" title="Iniciar Sistema"></div>
    </div>

    <div id="pantalla-narrador" class="pantalla">
        <div id="filtro-oscuro"></div>
        <div id="capa-alarma"></div>
        <img id="foto-narrador" src="cient.png" alt="Director">
        <div id="caja-narrador">
            <div id="texto-narrador"></div>
        </div>
        <div id="notificacion-emergencia">
            <h1>¡FALLO CRÍTICO DE PRESIÓN!</h1>
            <p>Los depósitos principales están a punto de colapsar.</p>
            <button class="btn-rojo" onclick="irAAlerta()">[ ABRIR PROTOCOLO ]</button>
        </div>
    </div>

    <div id="pantalla-alerta" class="pantalla">
        <div class="scanlines"></div>
        <h1 class="titulo-hacker">ALERTA CRÍTICA</h1>
        <div id="texto-historia"></div>
        <button id="btn-start-hacker" onclick="irAMapa()">[ ACCEDER AL MAPA TÁCTICO ]</button>
    </div>

    <div id="pantalla-mapa" class="pantalla">
        <h1 class="titulo-mapa">SECTOR 4: ESTADO CRÍTICO</h1>
        <div class="contenedor-mapa">
            <div class="nodo nodo-rojo" id="nodo-1" onclick="abrirHabitacion(1)" style="top: 25%; left: 20%;">1</div>
            <div class="nodo nodo-rojo" id="nodo-2" onclick="alert('Sistema bloqueado')" style="top: 60%; left: 35%;">2</div>
            <div class="nodo nodo-rojo" id="nodo-3" onclick="alert('Sistema bloqueado')" style="top: 30%; left: 50%;">3</div>
        </div>
    </div>

    <div id="pantalla-valvula" class="pantalla">
        <div class="panel-azul">
            <h2>Control Válvula 1</h2>
            <p>> Presión objetivo (Pa) <</p>
            <input type="number" id="respuestaAlumno" placeholder="---" autocomplete="off">
            <button id="btn-ejecutar-1" class="btn-accion" onclick="comprobarRespuesta()">[ EJECUTAR CIERRE ]</button>
            <button id="btn-volver-1" class="btn-accion btn-volver-mapa" onclick="volverAlMapaDesdeValvula(1)">[ VOLVER AL MAPA ]</button>
            <div id="mensaje-valvula"></div>
        </div>
    </div>

    <script>
        function irANarrador() {
            document.getElementById('pantalla-inicio').classList.remove('activa');
            document.getElementById('pantalla-narrador').classList.add('activa');
            setTimeout(escribirDialogo, 1000); 
        }

        function irAAlerta() {
            document.getElementById('pantalla-narrador').classList.remove('activa');
            document.getElementById('pantalla-alerta').classList.add('activa');
            setTimeout(escribirHistoriaHacker, 500); 
        }

        function irAMapa() {
            document.getElementById('pantalla-alerta').classList.remove('activa');
            document.getElementById('pantalla-mapa').classList.add('activa');
        }

        function abrirHabitacion(n) {
            if(n === 1) {
                document.getElementById('pantalla-mapa').classList.remove('activa');
                document.getElementById('pantalla-valvula').classList.add('activa');
                conectarMQTT();
            }
        }

        function volverAlMapaDesdeValvula(n) {
            document.getElementById('nodo-' + n).classList.remove('nodo-rojo');
            document.getElementById('nodo-' + n).classList.add('nodo-verde');
            document.getElementById('pantalla-valvula').classList.remove('activa');
            document.getElementById('pantalla-mapa').classList.add('activa');
        }

        const dialogo = "Saludos equipo. Bienvenidos al laboratorio AQUAFLUID. Hoy vamos a proceder a la verificación rutinaria de las válvulas. Los niveles de presión son estables, el flujo de agua es constante y... Espera, ¿qué es esa lectura en el sector 4? La presión interna está aumentando exponencialmente. ¡CUIDADO!";
        let i_dialogo = 0;
        function escribirDialogo() {
            if (i_dialogo < dialogo.length) {
                document.getElementById("texto-narrador").innerHTML += dialogo.charAt(i_dialogo);
                i_dialogo++;
                setTimeout(escribirDialogo, 40); 
            } else {
                setTimeout(() => {
                    document.getElementById('caja-narrador').style.display = 'none';
                    document.getElementById('foto-narrador').style.display = 'none';
                    document.getElementById('capa-alarma').classList.add('alarma-activada');
                    document.getElementById('notificacion-emergencia').style.display = 'block';
                }, 2500);
            }
        }

        const mensajeHacker = "SISTEMA COMPROMETIDO.\n\nFallo detectado en el Sector 4.\n\nEl nivel de fluidos está aumentando críticamente.\n\nNecesitamos sus conocimientos, ingeniero. El destino del equipo está en sus manos.";
        let i_hacker = 0;
        function escribirHistoriaHacker() {
            if (i_hacker < mensajeHacker.length) {
                let char = mensajeHacker.charAt(i_hacker);
                document.getElementById("texto-historia").innerHTML += char === '\n' ? "<br>" : char;
                i_hacker++;
                setTimeout(escribirHistoriaHacker, 25); 
            } else {
                document.getElementById("btn-start-hacker").style.display = "inline-block";
            }
        }

        var client;
        function conectarMQTT() {
            client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "cl_" + parseInt(Math.random()*100));
            client.connect({onSuccess: () => console.log("MQTT OK")});
        }

        function comprobarRespuesta() {
            if (document.getElementById("respuestaAlumno").value == 250) {
                document.getElementById("mensaje-valvula").style.color = "#39ff14";
                document.getElementById("mensaje-valvula").innerHTML = "Válvula 1 Cerrada.";
                client.send(new Paho.MQTT.Message("CERRAR_V1") {{ message.destinationName = "mecfluid/escuela/valvulas"; }});
                document.getElementById("btn-ejecutar-1").style.display = "none";
                document.getElementById("btn-volver-1").style.display = "inline-block";
            } else {
                document.getElementById("mensaje-valvula").style.color = "#ff073a";
                document.getElementById("mensaje-valvula").innerHTML = "Error de Presión.";
            }
        }
    </script>
</body>
</html>
