<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Sistema Blindado</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'VT323', monospace; background-color: #050505; color: white; }
        
        /* Contenedor universal de pantallas */
        .pantalla { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        .pantalla.activa { display: flex; }

        /* ================= PANTALLA 1: INICIO ================= */
        #pantalla-inicio { background: url('fondo (2).png') center/cover; }
        
        /* Ajusta 'top' y 'left' para mover el botón sobre tus letras */
        .boton-inicio-manual {
            position: absolute;
            top: 60%; /* BAJA ESTE NÚMERO PARA SUBIR EL BOTÓN */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 100px;
            cursor: pointer;
            z-index: 999; /* Asegura que esté por encima de todo */
            background: rgba(255, 0, 0, 0.3); /* BORRA ESTO CUANDO ESTÉ BIEN UBICADO */
            border: 2px solid red; /* BORRA ESTO CUANDO ESTÉ BIEN UBICADO */
        }

        /* ================= PANTALLA 2: NARRADOR ================= */
        #pantalla-narrador { background: url('techlab.jpg') center/cover; }
        #filtro-blur { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 1; }
        #foto-narrador { position: absolute; bottom: 0; left: 0; width: 480px; z-index: 4; filter: drop-shadow(0 0 20px #00ffff); }
        #caja-narrador { position: absolute; bottom: 10%; left: 35%; width: 600px; background: rgba(0,20,40,0.7); border: 2px solid #00ffff; padding: 30px; border-radius: 15px; z-index: 5; }
        
        /* ================= MAPAS Y NODOS ================= */
        .contenedor-mapa { position: relative; width: 800px; height: 800px; border: 2px solid #00ffff; }
        .nodo { position: absolute; width: 45px; height: 45px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 2px solid white; z-index: 10; transition: 0.3s; }
        .nodo-rojo { background: #ff073a; box-shadow: 0 0 20px #ff073a; animation: pulso 1s infinite; }
        .nodo-verde { background: #39ff14; box-shadow: 0 0 20px #39ff14; }
        .nodo-bloqueado { background: #333; border-color: #666; color: #666; cursor: not-allowed; }
        
        @keyframes pulso { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.15); } }

        /* ================= PANEL DE PROBLEMAS ================= */
        .panel-ui { background: rgba(0, 30, 60, 0.9); border: 3px solid #00ffff; padding: 40px; border-radius: 20px; text-align: center; width: 550px; }
        input { font-family: 'VT323'; font-size: 35px; width: 200px; background: #000; color: #00ffff; border: 2px solid #00ffff; text-align: center; margin: 20px 0; }
        .btn { font-family: 'VT323'; font-size: 28px; background: #00ffff; color: #000; border: none; padding: 10px 40px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div class="boton-inicio-manual" onclick="irANarrador()"></div>
    </div>

    <div id="pantalla-narrador" class="pantalla">
        <div id="filtro-blur"></div>
        <img id="foto-narrador" src="scient.png">
        <div id="caja-narrador">
            <div id="texto-narrador" style="font-size: 32px; color: #00ffff;"></div>
        </div>
        <button id="btn-entrar-mapa" class="btn" style="display:none; position:absolute; z-index:10; bottom: 20%;" onclick="irAMapaGlobal()">[ ACCEDER AL SISTEMA ]</button>
    </div>

    <div id="pantalla-mapa-global" class="pantalla">
        <h1 style="color:#00ffff; text-shadow: 0 0 10px #00ffff;">SECTOR 4: ESTADO CRÍTICO</h1>
        <div class="contenedor-mapa" style="background: url('mapa_neon.png') center/contain no-repeat;">
            <div class="nodo nodo-rojo" id="main-1" onclick="entrarHabitacion(1)" style="top: 22%; left: 32%;">1</div>
            <div class="nodo nodo-bloqueado" id="main-2" onclick="alert('Completa la Válvula 1 primero')" style="top: 18%; left: 71%;">2</div>
            <div class="nodo nodo-bloqueado" id="main-3" onclick="alert('Completa la Válvula 1 primero')" style="top: 55%; left: 30%;">3</div>
        </div>
    </div>

    <div id="pantalla-submapa" class="pantalla">
        <h2 id="titulo-submapa" style="color:#00ffff;">SISTEMA INTERNO: V1</h2>
        <div class="contenedor-mapa" style="background: rgba(0,255,255,0.1); border-style: dashed;">
            <div class="nodo nodo-rojo" id="sub-1" onclick="irAProblema(1)" style="top: 30%; left: 30%;">A</div>
            <div class="nodo nodo-rojo" id="sub-2" onclick="irAProblema(2)" style="top: 30%; left: 70%;">B</div>
            <div class="nodo nodo-rojo" id="sub-3" onclick="irAProblema(3)" style="top: 70%; left: 30%;">C</div>
            <div class="nodo nodo-rojo" id="sub-4" onclick="irAProblema(4)" style="top: 70%; left: 70%;">D</div>
        </div>
    </div>

    <div id="pantalla-problema" class="pantalla">
        <div class="panel-ui">
            <h2 id="prob-titulo" style="color:#00ffff; margin-top:0;">PROTOCOLO DE SEGURIDAD</h2>
            <div id="prob-enunciado" style="font-size:26px; margin-bottom:20px;"></div>
            <input type="number" id="prob-input" placeholder="000">
            <br>
            <button class="btn" onclick="verificarRespuesta()">[ EJECUTAR ]</button>
            <div id="prob-feedback" style="margin-top:20px; font-size:24px;"></div>
        </div>
    </div>

    <script>
        let vActual = 0;
        let tActual = 0;
        let sol = 0;
        let progreso = {
            1: [false, false, false, false],
            2: [false, false, false, false],
            3: [false, false, false, false]
        };

        function irANarrador() {
            console.log("Iniciando secuencia...");
            ocultarTodo();
            document.getElementById('pantalla-narrador').classList.add('activa');
            escribirTexto();
        }

        function escribirTexto() {
            const texto = "Ingeniero, hemos detectado una fuga masiva. El Sector 4 va a colapsar si no estabilizamos las 3 válvulas principales. ¡Rápido!";
            let i = 0;
            const caja = document.getElementById("texto-narrador");
            caja.innerHTML = "";
            let intervalo = setInterval(() => {
                caja.innerHTML += texto.charAt(i);
                i++;
                if(i >= texto.length) {
                    clearInterval(interval);
                    document.getElementById('btn-entrar-mapa').style.display = "block";
                }
            }, 40);
        }

        function irAMapaGlobal() {
            ocultarTodo();
            document.getElementById('pantalla-mapa-global').classList.add('activa');
            actualizarNodosPrincipales();
        }

        function entrarHabitacion(n) {
            vActual = n;
            ocultarTodo();
            document.getElementById('pantalla-submapa').classList.add('activa');
            document.getElementById('titulo-submapa').innerText = `SISTEMA INTERNO: V${n}`;
            actualizarNodosSubmapa();
        }

        function irAProblema(t) {
            tActual = t;
            ocultarTodo();
            document.getElementById('pantalla-problema').classList.add('activa');
            const n1 = Math.floor(Math.random() * 8) + 2;
            const env = document.getElementById("prob-enunciado");
            document.getElementById("prob-input").value = "";
            document.getElementById("prob-feedback").innerText = "";

            if(t === 1) { sol = 1000 * 10 * n1; env.innerHTML = `Calcula la presión hidrostática si h = <b>${n1}m</b>.<br>(ρ=1000, g=10)`; }
            else if(t === 2) { sol = n1 * 2; env.innerHTML = `Determina el caudal si v = <b>${n1}m/s</b> y A = <b>2m²</b>.`; }
            else if(t === 3) { sol = n1 * 10; env.innerHTML = `Calcula la fuerza si P = <b>${n1}Pa</b> y A = <b>10m²</b>.`; }
            else { sol = Math.round(Math.sqrt(2 * 10 * n1)); env.innerHTML = `Torricelli: v de salida si h = <b>${n1}m</b>.<br>(g=10, redondea)`; }
        }

        function verificarRespuesta() {
            const res = parseInt(document.getElementById("prob-input").value);
            const feed = document.getElementById("prob-feedback");
            if(res === sol) {
                feed.style.color = "#39ff14"; feed.innerText = "ACCESO CONCEDIDO";
                progreso[vActual][tActual-1] = true;
                setTimeout(() => {
                    if(progreso[vActual].every(x => x === true)) {
                        alert(`¡VÁLVULA ${vActual} CERRADA!`);
                        irAMapaGlobal();
                    } else {
                        entrarHabitacion(vActual);
                    }
                }, 1200);
            } else {
                feed.style.color = "#ff073a"; feed.innerText = "ERROR DE CÁLCULO";
                setTimeout(() => irAProblema(tActual), 1000);
            }
        }

        function actualizarNodosPrincipales() {
            for(let i=1; i<=3; i++) {
                let n = document.getElementById(`main-${i}`);
                if(progreso[i].every(x => x === true)) n.className = "nodo nodo-verde";
                else if(i === 1 || progreso[i-1].every(x => x === true)) n.className = "nodo nodo-rojo";
            }
        }

        function actualizarNodosSubmapa() {
            for(let i=1; i<=4; i++) {
                let n = document.getElementById(`sub-${i}`);
                n.className = progreso[vActual][i-1] ? "nodo nodo-verde" : "nodo nodo-rojo";
            }
        }

        function ocultarTodo() {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        }

        window.onload = () => { console.log("Sistema cargado."); };
    </script>
</body>
</html>
