<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Inicio</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-image: url('fondo.jpg'); /* Tu imagen */
            background-size: cover;
            background-position: center;
            background-color: #050505;
        }
        
        /* EL BOTÓN INVISIBLE */
        .boton-invisible {
            position: absolute;
            top: 57%; /* Ajusta este número si queda muy arriba o muy abajo */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px; /* Ancho del botón */
            height: 80px; /* Alto del botón */
            cursor: pointer;
            
            /* NOTA: Lo he puesto un poco azul brillante para que veas dónde cae. 
               Cuando veas que cuadra con tu dibujo, cambia este rgba por la palabra: transparent */
            background-color: rgba(0, 255, 255, 0.2); 
            border-radius: 10px;
            transition: 0.3s;
        }

        .boton-invisible:hover {
            background-color: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 30px #00ffff;
        }
    </style>
</head>
<body>
    <div class="boton-invisible" onclick="window.location.href='narrador.html'" title="Haz clic para Iniciar Sistema"></div>
</body>
</html>
