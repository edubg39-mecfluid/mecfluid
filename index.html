<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio AQUAFLUID</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'VT323', monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?q=80&w=2070&auto=format&fit=crop') center/cover;
            color: white; text-align: center;
        }
        
        .logo {
            font-size: 90px; letter-spacing: 5px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 20px; transition: opacity 1s;
        }
        
        /* La caja de la alerta que estará oculta al principio */
        .alerta-container {
            display: none;  flex-direction: column; align-items: center; background: rgba(20, 0, 0, 0.85); border: 3px solid #ff073a; padding: 40px; border-radius: 10px;
            max-width: 600px; box-shadow: 0 0 40px rgba(255, 7, 58, 0.6); animation: aparecer 1s ease-in;
        }
        
        @keyframes aparecer { from {opacity: 0; transform: scale(0.9);} to {opacity: 1; transform: scale(1);} }
        
        #warningIcon {
            width: 120px; height: 120px; animation: parpadeo 1s infinite;
            filter: drop-shadow(0px 0px 15px #ff073a); margin-bottom: 20px;
        }
        
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        
        .narrador { font-size: 28px; color: #e6f2ff; line-height: 1.4; margin-bottom: 30px; }
        
        /* Estilo del botón simulando una carta/sobre */
        .carta {
            background: #f4e8c1; color: #111; font-family: sans-serif; font-weight: bold; padding: 15px 40px; font-size: 22px; text-decoration: none;
            border-radius: 5px; border: 2px solid #c2a770; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .carta:hover { transform: scale(1.05); background: #ffffff; box-shadow: 0 5px 25px rgba(255,255,255,0.8); }
    </style>
</head>
<body>

    <div class="logo" id="logoAqua">AQUAFLUID<br><span style="font-size: 35px; color: #ccc;">Research Lab</span></div>

    <div class="alerta-container" id="cajaAlerta">
        <svg id="warningIcon" viewBox="0 0 24 24" fill="none" stroke="#ff073a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <div class="narrador">
            "¡Atención equipo! Hemos detectado una anomalía crítica en los sistemas de presión. Por favor, abran la carta de emergencia inmediatamente para recibir sus instrucciones."
        </div>
        
        <a href="alerta.html" class="carta">✉️ ABRIR CARTA DE EMERGENCIA</a>
    </div>

    <script>
        // Espera 3.5 segundos (3500 ms) y cambia la pantalla
        setTimeout(() => {
            document.getElementById('logoAqua').style.display = 'none';
            document.getElementById('cajaAlerta').style.display = 'flex';
        }, 3500);
    </script>
</body>
</html>
