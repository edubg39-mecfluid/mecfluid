<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUALAB - Sistema de Control Sector 11</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'VT323', monospace; background-color: #050505; color: white; }
        
        .pantalla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
        .pantalla.activa { display: flex; z-index: 10; }

        /* ================= PANTALLA 1: INICIO ================= */
        #pantalla-inicio { background: url('fondo (2).png') center/cover; }
        .boton-inicio { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 100px; cursor: pointer; background: rgba(0,255,255,0); z-index: 9999; }
        .boton-inicio:hover { background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 30px #00ffff; border-radius: 10px; }

        /* ================= PANTALLA 2: NARRADOR ================= */
        #pantalla-narrador { background: url('fondo (2).png') center/cover; }
        #filtro-oscuro { position: absolute; width: 100%; height: 100%; background: rgba(0, 10, 25, 0.7); backdrop-filter: blur(4px); z-index: 1; }
        
        #caja-narrador { 
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); 
            width: 90%; background: rgba(0, 30, 60, 0.9); border: 2px solid #00ffff; 
            border-radius: 12px; padding: 25px; z-index: 5; display: flex; align-items: center; gap: 25px;
            box-sizing: border-box; min-height: 200px;
        }
        
        #foto-narrador { width: 180px; height: auto; filter: drop-shadow(0 0 15px #00ffff); flex-shrink: 0; }
        
        #texto-narrador { 
            color: #00ffff; font-size: 30px; line-height: 1.3; 
            white-space: normal; word-wrap: break-word; overflow-wrap: break-word;
            flex: 1; min-width: 0; text-align: left;
        }

        /* ================= MAPAS ================= */
        #pantalla-mapa, #pantalla-habitacion { background: #000c1a; }
        .titulo-mapa { color: #00ffff; font-size: 34px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 10px #00ffff; }
        .contenedor-mapa { position: relative; width: 800px; height: 480px; border: 2px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        
        .nodo { position: absolute; width: 45px; height: 45px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 2px solid white; z-index: 20; transition: 0.3s; }
        .nodo-rojo { background: rgba(255, 7, 58, 0.7); border-color: #ff073a; box-shadow: 0 0 15px #ff073a; animation: pulso 1s infinite; }
        .nodo-verde { background: rgba(57, 255, 20, 0.7); border-color: #39ff14; box-shadow: 0 0 15px #39ff14; }
        .nodo-bloqueado { background: #333; border-color: #555; color: #777; cursor: not-allowed; }

        @keyframes pulso { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        /* ================= PANEL DE PROBLEMA ================= */
        #pantalla-valvula { background: linear-gradient(rgba(0,30,60,0.95), rgba(0,10,20,0.95)), url('techlab.jpg') center/cover; }
        .panel-azul { background: rgba(0, 43, 77, 0.95); padding: 35px; border-radius: 20px; border: 3px solid #00ffff; width: 500px; text-align: center; backdrop-filter: blur(10px); }
        input { font-family: 'VT323'; font-size: 35px; width: 220px; background: #003366; color: #ffffff; border: 2px solid #00ffff; text-align: center; margin: 15px 0; outline: none; }
        .btn-ui { font-family: 'VT323'; font-size: 26px; background: #00ffff; color: #000; border: none; padding: 10px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div class="boton-inicio" onclick="irANarrador()"></div>
    </div>

    <div id="pantalla-narrador" class="pantalla">
        <div id="filtro-oscuro"></div>
        <div id="caja-narrador">
            <img id="foto-narrador" src="chico111.png">
            <div id="texto-narrador"></div>
        </div>
        <button id="btn-mision" class="btn-ui" style="display:none; position:absolute; top:40%; z-index:100;" onclick="irAAlerta()">[ ABRIR PROTOCOLO ]</button>
    </div>

    <div id="pantalla-alerta" class="pantalla">
        <h1 style="color:#ff073a; font-size: 45px;">ALERTA DE SISTEMA</h1>
        <div id="texto-historia" style="font-size: 26px; max-width: 800px; text-align: left; margin: 20px; color:#39ff14;"></div>
        <button id="btn-start" class="btn-ui" style="display:none;" onclick="irAMapa()">[ ACCEDER AL SECTOR 11 ]</button>
    </div>

    <div id="pantalla-mapa" class="pantalla">
        <h1 class="titulo-mapa">ESTADO GLOBAL: SECTOR 11</h1>
        <div class="contenedor-mapa" style="background: url('mapa_neon.png') center/contain no-repeat;">
            <div class="nodo nodo-rojo" id="main-1" onclick="abrirHabitacion(1)" style="top: 25%; left: 25%;">1</div>
            <div class="nodo nodo-bloqueado" id="main-2" style="top: 25%; left: 75%;">2</div>
            <div class="nodo nodo-bloqueado" id="main-3" style="top: 75%; left: 25%;">3</div>
            <div class="nodo nodo-bloqueado" id="main-4" style="top: 75%; left: 75%;">4</div>
        </div>
    </div>

    <div id="pantalla-habitacion" class="pantalla">
        <h1 class="titulo-mapa" id="titulo-hab">HABITACIÓN 1: CONTROL</h1>
        <div class="contenedor-mapa" style="background: rgba(0, 255, 255, 0.05); border-style: dashed;">
            <div class="nodo nodo-rojo" id="sub-1" style="top: 30%; left: 30%;">A</div>
            <div class="nodo nodo-rojo" id="sub-2" style="top: 30%; left: 70%;">B</div>
            <div class="nodo nodo-rojo" id="sub-3" style="top: 70%; left: 30%;">C</div>
            <div class="nodo nodo-rojo" id="sub-4" style="top: 70%; left: 70%;">D</div>
        </div>
        <button class="btn-ui" style="margin-top:15px;" onclick="irAMapa()">[ VOLVER ]</button>
    </div>

    <div id="pantalla-valvula" class="pantalla">
        <div class="panel-azul">
            <div id="paso-info" style="color:#00ffff; font-size:22px;">---</div>
            <h2 style="color:#ffffff; margin:10px 0;">SISTEMA DE CALIBRACIÓN</h2>
            <div id="enunciado" style="font-size: 26px; color:#e6f2ff; margin-bottom: 20px;"></div>
            <input type="number" id="inputRes" step="any" placeholder="0.00">
            <br>
            <button class="btn-ui" onclick="verificarRes()">[ VERIFICAR ]</button>
            <div id="feed" style="margin-top:20px; font-size:24px;"></div>
        </div>
    </div>

    <script>
        let vAct = 1; let tAct = 0; let subFase = 1; 
        let valorBasePa = 0; let sol = 0;
        let progreso = { 
            1: [false, false, false, false], 2: [false, false, false, false], 
            3: [false, false, false, false], 4: [false, false, false, false] 
        };

        function mostrar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        function irANarrador() {
            mostrar('pantalla-narrador');
            const txt = "Saludos equipo.Bienvenidos al laboratorio AQUAFLUID.Vamos a proceder a verificar todas las válvulas del recinto.Los niveles de presión parece que son estables, el flujo de agua es constante y...Un momento, ¿qué es esa lectura en el sector 11? La presión interna está aumentando exponencialmente...";
            let i = 0; const caja = document.getElementById("texto-narrador");
            caja.innerHTML = "";
            let intv = setInterval(() => {
                let char = txt.charAt(i);
                caja.innerHTML += (char === " ") ? "&nbsp;" : char;
                i++;
                if(i >= txt.length){ 
                    clearInterval(intv); 
                    document.getElementById('btn-mision').style.display="block"; 
                }
            }, 30);
        }

        function irAAlerta() {
            mostrar('pantalla-alerta');
            const hTxt = "SISTEMA COMPROMETIDO...\nFallo detectado en las válvulas de refrigeración.\nEl nivel de fluidos aumenta críticamente.\nEstabilice los puntos de control A, B, C y D.";
            let i = 0; const caja = document.getElementById("texto-historia");
            caja.innerHTML = "";
            let intv = setInterval(() => {
                caja.innerHTML += hTxt.charAt(i) === "\n" ? "<br>" : hTxt.charAt(i);
                i++;
                if(i >= hTxt.length){ clearInterval(intv); document.getElementById('btn-start').style.display="block"; }
            }, 25);
        }

        function irAMapa() { mostrar('pantalla-mapa'); actualizarMapas(); }

        function abrirHabitacion(n) {
            if(n > 1 && !progreso[n-1].every(x => x === true)) return;
            vAct = n; mostrar('pantalla-habitacion');
            actualizarMapas();
        }

        function irAProblema(t) {
            tAct = t;
            if (t === 1 && vAct === 1) { 
                if(subFase === 1) valorBasePa = Math.floor(Math.random() * 900) + 100;
            }
            mostrar('pantalla-valvula');
            generarReto();
        }

        function generarReto() {
            const env = document.getElementById("enunciado");
            const paso = document.getElementById("paso-info");
            document.getElementById("inputRes").value = "";
            document.getElementById("feed").innerText = "";

            if (tAct === 1 && vAct === 1) { // Lógica estricta de 3 pasos para el PUNTO A
                paso.innerText = `PUNTO A: PASO ${subFase}/3`;
                if (subFase === 1) {
                    sol = valorBasePa / 100000;
                    env.innerHTML = `Presión detectada: <b>${valorBasePa} Pa</b> <br> Conviértelo a: <b>bar</b>`;
                } else if (subFase === 2) {
                    sol = valorBasePa / 100;
                    env.innerHTML = `Mismo valor: <b>${valorBasePa} Pa</b> <br> Conviértelo a: <b>mbar</b>`;
                } else {
                    sol = valorBasePa / 1000000;
                    env.innerHTML = `Mismo valor: <b>${valorBasePa} Pa</b> <br> Conviértelo a: <b>N/mm²</b>`;
                }
            } else {
                // Comodín temporal para B, C y D
                paso.innerText = `PUNTO ${String.fromCharCode(64+tAct)}: EN CONSTRUCCIÓN`;
                env.innerHTML = `Prueba mecánica en desarrollo. <br> Para superar esta prueba temporal, escribe <b>100</b>.`;
                sol = 100;
            }
        }

        function verificarRes() {
            const res = parseFloat(document.getElementById("inputRes").value);
            const feed = document.getElementById("feed");
            
            if (Math.abs(res - sol) < 0.000001) {
                feed.style.color = "#39ff14"; feed.innerText = "✓ ACCESO CONCEDIDO";
                setTimeout(() => {
                    if (tAct === 1 && vAct === 1 && subFase < 3) {
                        subFase++; generarReto(); 
                    } else {
                        // Resuelto! Quitamos el alert y volvemos directo
                        progreso[vAct][tAct-1] = true; 
                        subFase = 1; 
                        abrirHabitacion(vAct);
                    }
                }, 1000);
            } else {
                feed.style.color = "#ff073a"; feed.innerText = "✗ FALLO: REGENERANDO DATOS...";
                setTimeout(() => {
                    subFase = 1; 
                    if (tAct === 1 && vAct === 1) valorBasePa = Math.floor(Math.random() * 900) + 100;
                    generarReto();
                }, 1500);
            }
        }

        function actualizarMapas() {
            // Actualizar nodos del Mapa Global
            for(let i=1; i<=4; i++){
                let n = document.getElementById(`main-${i}`);
                if(!n) continue;
                if(progreso[i].every(x => x === true)) n.className = "nodo nodo-verde";
                else if(i === 1 || progreso[i-1].every(x => x === true)) {
                    n.className = "nodo nodo-rojo"; n.onclick = () => abrirHabitacion(i);
                }
            }
            
            // Actualizar nodos del Sub-Mapa (Habitación)
            for(let i=1; i<=4; i++){
                let n = document.getElementById(`sub-${i}`);
                if(!n) continue;
                
                if(progreso[vAct][i-1]) { 
                    n.className = "nodo nodo-verde"; 
                    n.onclick = null; // Desactiva si ya está en verde
                } else { 
                    n.className = "nodo nodo-rojo"; 
                    n.onclick = () => irAProblema(i); // Siempre clickables si están rojos
                }
            }
        }

        window.onload = () => { console.log("Sistema Cargado"); };
    </script>
</body>
</html>
