<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COMPROMETIDO</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {font-family: 'VT323', monospace; background-color: #050505; color: #39ff14; /* Verde Terminal */ text-align: center; padding: 50px 20px; margin: 0; overflow: hidden;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%; pointer-events: none; z-index: 10;
        }
        h1 {
            color: #ff073a; font-size: 50px; text-shadow: 0 0 10px #ff073a; margin-bottom: 10px; text-transform: uppercase;
        }
        .historia {
            font-size: 26px; max-width: 600px; margin: 30px auto; text-align: left; line-height: 1.5; min-height: 150px;
        }

        .btn-empezar {
            display: none; background-color: transparent; color: #00ffff; border: 2px solid #00ffff; padding: 15px 40px; font-size: 30px; font-family: 'VT323', monospace; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); transition: 0.3s; animation: parpadeo 1.5s infinite;
        }

        .btn-empezar:hover {
            background-color: #00ffff;
            color: #000;
        }

        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <h1>ALERTA CRÍTICA</h1>
    
    <div class="historia" id="texto-historia"></div>

    <button class="btn-empezar" id="btn-start" onclick="window.location.href='Servo1.html'">[ INICIAR PROTOCOLO DE SALVAMENTO ]</button>

    <script>
        // Texto que se escribirá solo, como un hacker
        const mensaje = "SISTEMA COMPROMETIDO.\n\nFallo detectado en las válvulas de refrigeración del laboratorio.\n\nEl nivel de fluidos está aumentando críticamente. Si no estabilizamos la presión, las instalaciones colapsarán.\n\nNecesitamos sus conocimientos en mecánica de fluidos, ingeniero. El destino del equipo está en sus manos.";
        
        let i = 0;
        function escribirTexto() {
            if (i < mensaje.length) {
                let char = mensaje.charAt(i);
                if (char === '\n') {
                    document.getElementById("texto-historia").innerHTML += "<br>";
                } else {
                    document.getElementById("texto-historia").innerHTML += char;
                }
                i++;
                // Velocidad de escritura (50 milisegundos por letra)
                setTimeout(escribirTexto, 50); 
            } else {
                // Cuando termina de escribir, muestra el botón
                document.getElementById("btn-start").style.display = "inline-block";
            }
        }

        // Arranca el efecto al cargar la página
        window.onload = escribirTexto;
    </script>
</body>
</html>
