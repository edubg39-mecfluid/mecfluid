<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Válvula IoT</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        /* --- ESTILOS GENERALES --- */
        body {font-family: 'VT323', monospace; font-size: 22px; color: #e6f2ff; text-align: center; padding: 20px; margin: 0; min-height: 100vh; /* Asegura que ocupe toda la altura */
            /* --- AQUI ESTÁ LA MAGIA DEL FONDO --- */
            /* Usamos una imagen de laboratorio y le ponemos una capa azul semitransparente encima */
            /* PUEDES CAMBIAR LA URL DE LA IMAGEN POR LA QUE TÚ QUIERAS */
            background: linear-gradient(rgba(0, 31, 63, 0.85), rgba(0, 31, 63, 0.9)), url('https://i.imgur.com/LetM14p.jpg');
            background-size: cover; /* Que cubra toda la pantalla */
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Que el fondo no se mueva al hacer scroll */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel {
            background-color: rgba(0, 51, 102, 0.9); padding: 30px; border-radius: 10px; box-shadow: 0px 0px 30px rgba(0, 255, 255, 0.3); 
            max-width: 400px; width: 100%; border: 3px solid #00ffff; backdrop-filter: blur(5px); /* Efecto de cristal borroso */
        }

        h2 { color: #00ffff; text-transform: uppercase; letter-spacing: 2px; margin-top: 0;}
        
        input {
            font-family: 'VT323', monospace; font-size: 24px; padding: 10px; width: 80%; margin: 15px 0;
            background-color: #001f3f; color: #00ffff; border: 2px solid #00ffff; text-align: center;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        button {
            font-family: 'VT323', monospace; font-size: 26px; background-color: #00ffff; color: #001f3f;
            border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 85%;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background-color: #ffffff; box-shadow: 0px 0px 20px #ffffff; }

        /* --- ESTILOS DEL TRIÁNGULO DE WARNING --- */
        #warningIcon {
            width: 80px; margin-top: 25px; display: none; animation: parpadeo 1s infinite;
        }

        /* Clase para hacer temblar el panel si fallan */
        .shake { animation: shake 0.5s; }
        
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

        #mensaje { margin-top: 15px; font-size: 28px; }
        .status { font-size: 16px; color: #00aaaa; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="panel" id="mainPanel">
        <h2>Sistema de Control Hidráulico</h2>
        <p>>>> Introduce presión objetivo (Pa) <<<</p>
        
        <input type="number" id="respuestaAlumno" placeholder="---">
        <button onclick="comprobarRespuesta()">[ EJECUTAR CIERRE ]</button>
        
        <img id="warningIcon" src="https://i.imgur.com/PZ8qT9L.png" alt="Warning">
        
        <p id="mensaje"></p>
        <p class="status" id="statusMQTT">Iniciando enlace satélite...</p>
    </div>

    <script>
        // --- CONFIGURACIÓN MQTT ---
        var broker = "broker.hivemq.com";
        var port = 8000;
        var topic = "mecfluid/escuela/valvulaA1"; 
        
        var client = new Paho.MQTT.Client(broker, port, "cliente_genially_" + parseInt(Math.random() * 100, 10));

        function onConnect() { document.getElementById("statusMQTT").innerText = ">>> Enlace establecido. Sistema listo."; document.getElementById("statusMQTT").style.color = "#00ffff"; }
        function onFailure(message) { document.getElementById("statusMQTT").innerText = "ERROR: Fallo de enlace. Recargar terminal."; document.getElementById("statusMQTT").style.color = "red"; }
        client.connect({onSuccess:onConnect, onFailure:onFailure});

        // --- LÓGICA DEL JUEGO ---
        function comprobarRespuesta() {
            let valorEscrito = document.getElementById("respuestaAlumno").value;
            let mensajePantalla = document.getElementById("mensaje");
            let warningImg = document.getElementById("warningIcon"); // Referencia a la imagen
            let panelDiv = document.getElementById("mainPanel"); // Referencia al panel entero
            
            let respuestaCorrecta = 2500; 

            // Reseteamos estados previos (quitamos temblor y ocultamos imagen por si acaso)
            panelDiv.classList.remove("shake");
            warningImg.style.display = "none";

            if (valorEscrito == respuestaCorrecta) {
                // --- ACIERTO ---
                mensajePantalla.style.color = "#39ff14";
                mensajePantalla.style.textShadow = "0px 0px 10px #39ff14";
                mensajePantalla.innerHTML = "¡CÁLCULO VERIFICADO!<br>Accionando secuencia de cierre...";
                
                message = new Paho.MQTT.Message("CERRAR");
                message.destinationName = topic;
                client.send(message);
                
            } else {
                // --- ERROR ---
                // 1. Mostramos el triángulo
                warningImg.style.display = "inline-block";
                
                // 2. Cambiamos el mensaje a rojo
                mensajePantalla.style.color = "#ff073a";
                mensajePantalla.style.textShadow = "0px 0px 10px #ff073a";
                mensajePantalla.innerHTML = "ERROR CRÍTICO<br>Parámetros incorrectos.";
                
                // 3. Extra: Hacemos que el panel tiemble un poco
                void panelDiv.offsetWidth; // Truco para reiniciar la animación
                panelDiv.classList.add("shake");
            }
        }
    </script>
</body>
</html>
